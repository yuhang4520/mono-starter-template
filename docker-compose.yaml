services:
  db:
    image: postgres:17
    restart: always
    shm_size: 2048mb
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: starter
    ports:
      - 5342:5432
    volumes:
      - ./.localdata/data:/var/lib/postgresql/data
      - ./docker-init:/docker-entrypoint-initdb.d
    networks:
      - starter_net

  minio:
    image: quay.io/minio/minio
    restart: always
    container_name: minio_tmp_local
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "minio.local"
    ports:
      - "0.0.0.0:9001:9001" # MinIO API port
    volumes:
      - ./.localdata/minio_data:/data # Persist data outside the container
    command: server /data
    networks:
      - starter_net

  minio_init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:${MINIO_PORT:-9001} minio minio.local;
      mc mb -p local/starter-shared-bucket || true;
      echo '✅ MinIO bucket ensured';
      "
    restart: "no"
    networks:
      - starter_net
networks:
  starter_net:
    name: starter_net
    driver: bridge
