services:
  db:
    image: postgres
    restart: always
    shm_size: 2048mb
    environment:
      POSTGRES_PASSWORD: example
    ports:
      - 5432:5432
    command: ["postgres", "-c", "log_statement=all"]
    volumes:
      - ./.localdata/data:/var/lib/postgresql/data
      - ./misc/postgresql.conf:/var/lib/postgresql/data/postgresql.conf
    networks:
      - starter_net

  minio:
    image: quay.io/minio/minio
    restart: always
    container_name: minio_local
    environment:
      MINIO_ROOT_USER: "minio"
      MINIO_ROOT_PASSWORD: "minio.local"
    ports:
      - "0.0.0.0:9000:9000" # MinIO API port
    volumes:
      - ./.localdata/minio_data:/data # Persist data outside the container
    command: server /data
    networks:
      - starter_net

  minio_init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio.local;
      mc mb -p local/starter-shared-bucket || true;
      echo '✅ MinIO bucket ensured';
      "
    restart: "no"
    networks:
      - starter_net
networks:
  starter_net:
    name: starter_net
    driver: bridge
