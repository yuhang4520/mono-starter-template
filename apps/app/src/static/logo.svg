<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="90" fill="#f3f4f6"/>

  <!-- 抽象图形 - 类似山峰或字母 M -->
  <path d="M50 140 L50 80 L80 50 L100 70 L120 50 L150 80 L150 140 L120 110 L100 130 L80 110 Z"
        fill="url(#grad1)"
        stroke="none"/>

  <!-- 装饰性小圆点 -->
  <circle cx="100" cy="45" r="8" fill="#667eea" opacity="0.6"/>
  <circle cx="60" cy="90" r="5" fill="#764ba2" opacity="0.4"/>
  <circle cx="140" cy="90" r="5" fill="#764ba2" opacity="0.4"/>
</svg>
